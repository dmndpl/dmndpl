set -g mouse on
set -g history-limit 1000
set -g status-interval 5

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc

# --- Powerline-style status bar ---

set -g status on
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g message-style "bg=#1e1e2e,fg=#cdd6f4"
set -g pane-border-style "fg=#6c7086"
set -g pane-active-border-style "fg=#89b4fa"

# Left side: session name
set -g status-left-length 50
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[fg=#89b4fa,bg=#1e1e2e] "

# Right side: time
set -g status-right-length 50
set -g status-right "#[fg=#6c7086]#[bg=#6c7086,fg=#1e1e2e] %H:%M "

# Window tabs
setw -g window-status-format " #[fg=#6c7086]#I:#W "
setw -g window-status-current-format "#[bg=#313244,fg=#cdd6f4,bold] #I:#W "
